name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. SAST (Static Application Security Testing)
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true # Interviewer ko batana ki abhi hum sirf test kar rahe hain

    # 2. Docker Image Build
    - name: Build Docker Image
      run: docker build -t devsecops-app:${{ github.sha }} .

    # 3. Container Image Scanning (Trivy)
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'devsecops-app:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # Agar critical vulnerability mili toh pipeline fail ho jayegi
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'